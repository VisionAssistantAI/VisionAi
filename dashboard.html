<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - VisionAI Assistant</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #FFD700;
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('VISION_AI_2-removebg.png') no-repeat center center;
            background-size: contain;
            z-index: -1;
        }

        /* User Info Block (Top Left) */
        .user-info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px #FFD700;
            width: 280px;
        }

        .user-info h2 {
            margin: 0;
            font-size: 18px;
            text-align: center;
        }

        .user-info p {
            margin: 5px 0;
            font-size: 14px;
        }

        /* Logout Button (Top Right) */
        .logout-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #FFD700;
            color: #000;
            font-weight: bold;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .logout-button:hover {
            background-color: #FFC107;
        }

        /* Affiliate Link Section */
        .affiliate-section {
            margin-top: 10px;
            text-align: center;
        }

        .affiliate-link {
            background: #000;
            color: #FFD700;
            padding: 5px;
            border: 1px solid #FFD700;
            border-radius: 5px;
            word-wrap: break-word;
            display: block;
            text-align: center;
            cursor: pointer;
        }

        /* Copy Button */
        .copy-button {
            margin-top: 5px;
            background-color: #FFD700;
            color: #000;
            font-weight: bold;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 14px;
        }

        .copy-button:hover {
            background-color: #FFC107;
        }

        /* Wallet Section */
        .wallet {
            margin-top: 10px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #FFD700;
        }

        /* Download Section (Right Side) */
        .download-section {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px #FFD700;
            width: 280px;
            text-align: center;
        }

        .download-section h3 {
            margin: 0;
            font-size: 16px;
            color: #FFD700;
        }

        .download-link {
            display: block;
            margin-top: 10px;
            padding: 10px;
            background-color: #FFD700;
            color: #000;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .download-link:hover {
            background-color: #FFC107;
        }

        .os-selection {
            margin-top: 10px;
        }

        select {
            padding: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <!-- User Info (Top Left) -->
    <div class="user-info">
        <h2>Welcome, <span id="userEmail"></span></h2>
        <p><strong>Region:</strong> <span id="userRegion"></span></p>
        <div class="wallet">
            <p><strong>Wallet Balance:</strong> $0.00</p>
        </div>
        <div class="affiliate-section">
            <p><strong>Your Affiliate Link:</strong></p>
            <div class="affiliate-link" id="affiliateLink">https://visionassistantai.com/ref?user=</div>
            <button class="copy-button" onclick="copyAffiliateLink()">Copy</button>
        </div>
    </div>

    <!-- Logout Button (Top Right) -->
    <button class="logout-button" onclick="logout()">Logout</button>

    <!-- Download Section (Right Side) -->
    <div class="download-section">
        <h3>Latest Version: <span id="latestVersion">1.0.0</span></h3>
        <a id="downloadButton" class="download-link" href="#">Download Vision</a>
        <div class="os-selection">
            <label for="osSelect">Select OS:</label>
            <select id="osSelect" onchange="updateDownloadLink()">
                <option value="windows">Windows</option>
                <option value="macos">macOS</option>
                <option value="linux">Linux</option>
            </select>
        </div>
    </div>

    <script>
        // Simulated user data (Replace with API call)
        const userData = {
            email: "test@example.com",
            region: "USA",
            affiliateID: "12345",
            latestVersion: "2.5.1"
        };

        // Set user info
        document.getElementById("userEmail").innerText = userData.email;
        document.getElementById("userRegion").innerText = userData.region;
        document.getElementById("affiliateLink").innerText = `https://visionassistantai.com/ref?user=${userData.affiliateID}`;
        document.getElementById("latestVersion").innerText = userData.latestVersion;

        // Auto-detect OS and update download link
        function detectOS() {
            let os = "windows";
            if (navigator.userAgent.indexOf("Mac") !== -1) os = "macos";
            if (navigator.userAgent.indexOf("Linux") !== -1) os = "linux";
            document.getElementById("osSelect").value = os;
            updateDownloadLink();
        }

        // Update download link based on OS selection
        function updateDownloadLink() {
            const os = document.getElementById("osSelect").value;
            const downloadLinks = {
                windows: "https://visionassistantai.com/downloads/windows/vision-setup.exe",
                macos: "https://visionassistantai.com/downloads/macos/vision.dmg",
                linux: "https://visionassistantai.com/downloads/linux/vision.AppImage"
            };
            document.getElementById("downloadButton").href = downloadLinks[os];
        }

        // Copy Affiliate Link to Clipboard
        function copyAffiliateLink() {
            const link = document.getElementById("affiliateLink").innerText;
            navigator.clipboard.writeText(link).then(() => {
                alert("Affiliate link copied to clipboard!");
            }).catch(err => {
                console.error("Failed to copy:", err);
            });
        }

        // Logout function
        function logout() {
            alert("Logging out...");
            window.location.href = "login.html";
        }

        // Initialize on load
        detectOS();
    </script>

</body>
</html>
