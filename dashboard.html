<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionAI Assistant</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #FFFFFF;
            color: #000000;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('VISION_AI_2-removebg.png') no-repeat center center;
            background-size: contain;
            z-index: -1;
        }

        header {
            position: fixed;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        .buttons {
            display: flex;
            gap: 15px;
        }

        .button {
            font-size: 16px;
            font-weight: bold;
            color: #000;
            background-color: #FFD700;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #FFC107;
        }
    </style>
</head>
<body>
    <header>
        <!-- Register and Login Buttons -->
        <div class="buttons">
            <a href="register.html" class="button">Register</a>
            <a href="login.html" class="button">Login</a> <!-- Updated link -->
        </div>
    </header>
</body>
</html>
